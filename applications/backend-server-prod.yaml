apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backend-server-prod 
  namespace: argocd
  annotations:
    # Configuración del image updater
    argocd-image-updater.argoproj.io/image-list: api-server=hakimsamouh/api-server
    argocd-image-updater.argoproj.io/api-server.allow-tags: regexp:^prod-.*
    argocd-image-updater.argoproj.io/api-server.update-strategy: newest-build
    argocd-image-updater.argoproj.io/api-server.kustomize.image-name: hakimsamouh/api-server
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: https://github.com/hakimsa/hakimsa-k8s-fixed.git
    path: deploy-backend/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
